version: '3.8'

services:
  aetherweave:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
        VCS_REF: ${VCS_REF:-unknown}
        VCS_BRANCH: ${VCS_BRANCH:-unknown}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    image: aetherweave:latest
    container_name: aetherweave
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
      - WEB_CONCURRENCY=${WEB_CONCURRENCY:-2}
      - GUNICORN_THREADS=${GUNICORN_THREADS:-4}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    volumes:
      # 数据持久化 - 数据库文件
      - ./data:/app/data
      # 日志持久化
      - ./logs:/app/logs
    # 资源限制 - 适合阿里云 2核2G 服务器
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1500M
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aetherweave-network

networks:
  aetherweave-network:
    driver: bridge
