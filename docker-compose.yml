version: '3.8'

services:
  aetherweave:
    build:
      context: .
      dockerfile: Dockerfile
    image: aetherweave:latest
    container_name: aetherweave
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - FLASK_ENV=production
    volumes:
      # 数据持久化 - 数据库文件
      - ./data:/app/data
      # 日志持久化
      - ./logs:/app/logs
    # 资源限制 - 适配4核8G服务器
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.5'
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - aetherweave-network

networks:
  aetherweave-network:
    driver: bridge
