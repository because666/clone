<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>苍穹织网 AetherWeave | 低空经济AI数字孪生引擎</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 网站备案号 -->
    <div style="position: fixed; bottom: 8px; width: 100%; text-align: center; z-index: 9999; pointer-events: none;">
      <div style="display: inline-flex; align-items: center; gap: 12px; background-color: rgba(0, 0, 0, 0.25); backdrop-filter: blur(4px); padding: 3px 14px; border-radius: 12px; pointer-events: auto;">
        <!-- 工信部ICP备案 -->
        <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer"
           style="color: rgba(255,255,255,0.85); text-decoration: none; font-size: 12px; font-family: sans-serif; letter-spacing: 0.4px; white-space: nowrap;">
          桂ICP备2026005821号
        </a>
        <!-- 分隔线 -->
        <span style="color: rgba(255,255,255,0.3); font-size: 12px;">|</span>
        <!-- 公安网安备案 -->
        <a href="http://www.beian.gov.cn/portal/registerSystemInfo?recordcode=450902020000529"
           target="_blank" rel="noopener noreferrer"
           style="display: inline-flex; align-items: center; gap: 4px; color: rgba(255,255,255,0.85); text-decoration: none; font-size: 12px; font-family: sans-serif; letter-spacing: 0.4px; white-space: nowrap;">
          <img src="/beian-police.png" alt="公安备案" style="width: 14px; height: 14px; vertical-align: middle; display: inline-block;" />
          桂公网安备450902020000529号
        </a>
      </div>
    </div>
    <script>
      // 全局错误捕获（用于诊断 Vercel 部署黑屏问题）
      window.__BOOT_ERRORS = [];
      window.addEventListener('error', function(e) {
        window.__BOOT_ERRORS.push('ERROR: ' + e.message + ' at ' + (e.filename||'') + ':' + e.lineno);
        document.getElementById('root').style.cssText = 'color:#f87171;padding:40px;font-family:monospace;white-space:pre-wrap;font-size:14px;';
        document.getElementById('root').textContent = '❌ 启动错误:\n' + window.__BOOT_ERRORS.join('\n');
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown rejection';
        window.__BOOT_ERRORS.push('REJECTION: ' + msg);
        document.getElementById('root').style.cssText = 'color:#f87171;padding:40px;font-family:monospace;white-space:pre-wrap;font-size:14px;';
        document.getElementById('root').textContent = '❌ 启动错误:\n' + window.__BOOT_ERRORS.join('\n');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
