<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>苍穹织网 AetherWeave | 低空经济AI数字孪生引擎</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- 网站备案号 -->
    <div style="position: fixed; bottom: 8px; width: 100%; text-align: center; z-index: 9999; pointer-events: none;">
      <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener noreferrer" style="display: inline-block; background-color: rgba(0, 0, 0, 0.25); backdrop-filter: blur(4px); color: #ffffff; padding: 2px 10px; border-radius: 10px; text-decoration: none; font-size: 12px; font-family: sans-serif; pointer-events: auto; letter-spacing: 0.5px;">
        备案号：2026005821号
      </a>
    </div>
    <script>
      // 全局错误捕获（用于诊断 Vercel 部署黑屏问题）
      window.__BOOT_ERRORS = [];
      window.addEventListener('error', function(e) {
        window.__BOOT_ERRORS.push('ERROR: ' + e.message + ' at ' + (e.filename||'') + ':' + e.lineno);
        document.getElementById('root').style.cssText = 'color:#f87171;padding:40px;font-family:monospace;white-space:pre-wrap;font-size:14px;';
        document.getElementById('root').textContent = '❌ 启动错误:\n' + window.__BOOT_ERRORS.join('\n');
      });
      window.addEventListener('unhandledrejection', function(e) {
        var msg = e.reason ? (e.reason.stack || e.reason.message || String(e.reason)) : 'Unknown rejection';
        window.__BOOT_ERRORS.push('REJECTION: ' + msg);
        document.getElementById('root').style.cssText = 'color:#f87171;padding:40px;font-family:monospace;white-space:pre-wrap;font-size:14px;';
        document.getElementById('root').textContent = '❌ 启动错误:\n' + window.__BOOT_ERRORS.join('\n');
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
